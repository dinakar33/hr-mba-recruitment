<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR Blog | Executive Recruitment Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .nav-active { background-color: rgba(255, 255, 255, 0.2); border-bottom: 2px solid white; }
    </style>
    <!-- Firebase SDK (Configured for Cloud Sync) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB68T3Pz1DBCfqfPlt00qw9OI7hqTFjemQ",
            authDomain: "hr-blog-app.firebaseapp.com",
            databaseURL: "https://hr-blog-app-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "hr-blog-app",
            storageBucket: "hr-blog-app.firebasestorage.app",
            messagingSenderId: "622131978390",
            appId: "1:622131978390:web:ae9ae697d7c84dea9a22b7"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        // DEFERRED INITIALIZATION: Logic won't crash even if connection takes time
        window.saveData = async (path, data) => {
            try { await set(ref(db, path), data); } catch (e) { console.warn("Syncing...", e); }
        };
    </script>
</head>
<body>

    <!-- Header -->
    <header class="bg-[#1e40af] text-white p-6 shadow-lg">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-extrabold">HR Blog</h1>
                <p class="text-blue-200 italic">CRACK THE CODE, KNOW YOUR WORTH.</p>
            </div>
            <button onclick="adminLogin()" class="text-sm font-semibold flex items-center gap-2">
                <span class="opacity-80">🔒 Admin Login</span>
            </button>
        </div>
    </header>

    <!-- Nav -->
    <nav class="bg-[#1e40af] text-white">
        <div class="max-w-6xl mx-auto flex overflow-x-auto px-4">
            <button onclick="showTab('onboarding', this)" class="tab-trigger nav-active px-6 py-3 font-semibold text-sm whitespace-nowrap">👤 Onboarding</button>
            <button onclick="showTab('ats', this)" class="tab-trigger px-6 py-3 font-semibold text-sm hover:bg-blue-800 whitespace-nowrap">📄 ATS Audit</button>
            <button onclick="showTab('test', this)" class="tab-trigger px-6 py-3 font-semibold text-sm hover:bg-blue-800 whitespace-nowrap">🧠 Aptitude Test</button>
            <button onclick="showTab('gd', this)" class="tab-trigger px-6 py-3 font-semibold text-sm hover:bg-blue-800 whitespace-nowrap">👥 Group Discussion</button>
            <button onclick="showTab('passport', this)" class="tab-trigger px-6 py-3 font-semibold text-sm hover:bg-blue-800 whitespace-nowrap">🎯 Talent Passport</button>
            <button onclick="showTab('rights', this)" class="tab-trigger px-6 py-3 font-semibold text-sm hover:bg-blue-800 whitespace-nowrap">⚖️ Labor Rights</button>
        </div>
    </nav>

    <!-- Content Area -->
    <main class="max-w-6xl mx-auto p-6">
        <p class="text-slate-600 mb-6 italic">Enter your credentials and complete the psychological survey to determine your workplace archetype.</p>

        <!-- Onboarding Tab -->
        <div id="onboarding" class="tab-content active grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="bg-white p-8 rounded-xl shadow border border-slate-200">
                <h2 class="text-xl font-bold mb-6 flex items-center gap-2">👤 Personal Details</h2>
                <div class="space-y-4">
                    <input type="text" id="name" placeholder="Full Name" class="w-full p-3 border rounded-lg border-slate-300">
                    <input type="email" id="email" placeholder="Email Address" class="w-full p-3 border rounded-lg border-slate-300">
                    <select class="w-full p-3 border rounded-lg border-slate-300">
                        <option>MBA - Human Resources</option>
                        <option>MBA - Finance</option>
                        <option>MBA - Marketing</option>
                    </select>
                </div>
            </div>

            <div class="bg-white p-8 rounded-xl shadow border border-slate-200">
                <h2 class="text-xl font-bold mb-6 flex items-center gap-2">🧩 Archetype Assessment</h2>
                <p class="mb-4 text-sm">When facing a complex corporate roadblock, your first instinct is to:</p>
                <div class="space-y-3">
                    <label class="block p-3 border rounded-lg border-slate-200"><input type="radio" name="q" class="mr-2" checked> Analyze past data and formulate a structured framework</label>
                    <label class="block p-3 border rounded-lg border-slate-200"><input type="radio" name="q" class="mr-2"> Brainstorm a disruptive, out-of-the-box workaround</label>
                    <label class="block p-3 border rounded-lg border-slate-200"><input type="radio" name="q" class="mr-2"> Consult team members to build consensus and morale</label>
                    <label class="block p-3 border rounded-lg border-slate-200"><input type="radio" name="q" class="mr-2"> Execute immediately with tactical focus on deliverables</label>
                </div>
            </div>
            <button onclick="saveCandidate()" class="md:col-span-2 bg-[#1e40af] text-white p-4 rounded-xl font-bold text-lg shadow-lg hover:bg-blue-900 transition">Lock Profile & Generate Archetype →</button>
        </div>
    </main>

    <script>
        function showTab(id, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.tab-trigger').forEach(b => b.classList.remove('nav-active'));
            btn.classList.add('nav-active');
        }

        async function saveCandidate() {
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            if(!name || !email) return alert('Please enter name and email');
            
            // This is the Cloud Sync logic that stays in the background
            await window.saveData('candidates/' + name.replace(/\s+/g, '_'), { name, email, timestamp: Date.now() });
            alert('Candidate profile saved to the Executive Recruitment Hub.');
        }

        function adminLogin() {
            const pass = prompt("Enter Admin Passcode:");
            if(pass === "admin123") alert("Admin Access Granted.");
            else alert("Access Denied.");
        }
    </script>
</body>
</html>
