<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR Blog | Executive Recruitment Platform</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

    <script>
        tailwind.config = {
            theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] }, colors: { brand: { 50: '#eff6ff', 100: '#dbeafe', 200: '#bfdbfe', 300: '#93c5fd', 400: '#60a5fa', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8', 800: '#1e40af', 900: '#1e3a8a' } } } }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .tab-content { display: none; animation: fadeIn 0.4s ease-in-out; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(226, 232, 240, 0.8); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .admin-only { display: none; }
        body.admin-mode .admin-only { display: block; }
        body.admin-mode .admin-login-btn { display: none; }
        .admin-only-flex { display: none; }
        body.admin-mode .admin-only-flex { display: flex; }
    </style>
</head>
<body class="text-slate-800 antialiased min-h-screen flex flex-col">

    <header class="bg-brand-900 text-white shadow-xl sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
            <div class="flex justify-between items-center">
                <div>
                    <h1 class="text-3xl font-extrabold tracking-tight">HR Blog</h1>
                    <p class="text-brand-100 text-sm font-medium mt-1 uppercase tracking-wider">Crack the Code, Know Your Worth.</p>
                </div>
                <div class="hidden md:flex items-center space-x-4">
                    <button onclick="window.openAdminModal()" class="admin-login-btn text-brand-100 hover:text-white transition text-sm font-medium">
                        <i class="fa-solid fa-lock mr-1"></i> Admin Login
                    </button>
                    <div id="adminControls" class="admin-only-flex items-center space-x-3">
                        <div class="flex items-center bg-brand-800 border border-brand-600 text-white rounded-lg px-3 py-2 shadow-inner">
                            <i class="fa-solid fa-satellite-dish animate-pulse mr-2 text-green-400"></i>
                            <select id="adminCandidateSelect" onchange="window.onAdminSelectCandidate(this.value)" class="bg-transparent text-white font-bold outline-none text-sm cursor-pointer w-48">
                                <option value="" class="text-slate-800">-- Select Candidate --</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="bg-brand-800 overflow-x-auto no-scrollbar">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <nav class="flex space-x-1 py-2" id="tabNav">
                    <button onclick="window.switchTab('tab-onboarding', this)" class="nav-btn active bg-brand-700 text-white px-4 py-2 rounded-md text-sm font-medium whitespace-nowrap transition"><i class="fa-solid fa-user-plus mr-2"></i>Onboarding</button>
                    <button onclick="window.switchTab('tab-ats', this)" class="nav-btn text-brand-100 hover:bg-brand-700 hover:text-white px-4 py-2 rounded-md text-sm font-medium whitespace-nowrap transition"><i class="fa-solid fa-file-pdf mr-2"></i>ATS Audit</button>
                    <button onclick="window.switchTab('tab-test', this)" class="nav-btn text-brand-100 hover:bg-brand-700 hover:text-white px-4 py-2 rounded-md text-sm font-medium whitespace-nowrap transition"><i class="fa-solid fa-brain mr-2"></i>Aptitude Test</button>
                    <button onclick="window.switchTab('tab-gd', this)" class="nav-btn text-brand-100 hover:bg-brand-700 hover:text-white px-4 py-2 rounded-md text-sm font-medium whitespace-nowrap transition"><i class="fa-solid fa-users mr-2"></i>Group Discussion</button>
                    <button onclick="window.switchTab('tab-passport', this)" class="nav-btn text-brand-100 hover:bg-brand-700 hover:text-white px-4 py-2 rounded-md text-sm font-medium whitespace-nowrap transition"><i class="fa-solid fa-id-card mr-2"></i>Talent Passport</button>
                    <button onclick="window.switchTab('tab-rights', this)" class="nav-btn text-brand-100 hover:bg-brand-700 hover:text-white px-4 py-2 rounded-md text-sm font-medium whitespace-nowrap transition"><i class="fa-solid fa-scale-balanced mr-2"></i>Labor Rights</button>
                </nav>
            </div>
        </div>
    </header>

    <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <section id="tab-onboarding" class="tab-content active">
            <h2 class="text-2xl font-bold mb-6">Candidate Registration</h2>
            <div class="glass-card p-6 rounded-xl shadow-sm">
                <input type="text" id="candName" placeholder="Full Name" class="w-full border p-3 rounded mb-4">
                <input type="email" id="candEmail" placeholder="Email Address" class="w-full border p-3 rounded mb-4">
                <button onclick="window.saveProfile()" class="bg-brand-600 text-white w-full py-3 rounded-lg font-bold">Lock Profile</button>
            </div>
        </section>

        <!-- ... (Include remaining sections similarly) ... -->
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB68T3Pz1DBCfqfPlt00qw9OI7hqTFjemQ",
            authDomain: "hr-blog-app.firebaseapp.com",
            projectId: "hr-blog-app",
            storageBucket: "hr-blog-app.firebasestorage.app",
            messagingSenderId: "622131978390",
            appId: "1:622131978390:web:ae9ae697d7c84dea9a22b7"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        window.saveProfile = () => alert("Cloud Sync Initialized.");
        window.switchTab = (id, btn) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        };
        window.openAdminModal = () => document.getElementById('adminModal').classList.remove('hidden');
        window.closeAdminModal = () => document.getElementById('adminModal').classList.add('hidden');
        window.verifyAdmin = () => {
            if(document.getElementById('adminPass').value === 'admin123') {
                document.body.classList.add('admin-mode');
                window.closeAdminModal();
            } else alert('Wrong password');
        };
    </script>
</body>
</html>
