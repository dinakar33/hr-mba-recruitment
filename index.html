<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HR Blog | Executive Recruitment</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
</head>
<body class="bg-gray-100 p-4">
    <div class="max-w-3xl mx-auto bg-white p-6 rounded-xl shadow-lg">
        <h1 class="text-2xl font-bold mb-4">HR Blog Assessment</h1>
        <div id="app" class="space-y-4">
            <input type="text" id="name" placeholder="Full Name" class="w-full p-3 border rounded">
            <input type="email" id="email" placeholder="Email" class="w-full p-3 border rounded">
            <input type="file" id="resume" class="w-full p-3 border rounded">
            <button onclick="startAssessment()" class="w-full bg-blue-600 text-white p-3 rounded font-bold">Start Assessment</button>
        </div>
        <div id="results" class="hidden mt-6 p-4 bg-green-50 rounded border">
            <h2 class="font-bold text-lg">Assessment Complete!</h2>
            <p>Your profile has been saved.</p>
        </div>
    </div>
    <script>
        function startAssessment() {
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            if(!name || !email) {
                alert('Please fill all fields');
                return;
            }
            document.getElementById('app').classList.add('hidden');
            document.getElementById('results').classList.remove('hidden');
            console.log("Candidate registered:", name, email);
        }
    </script>
</body>
</html>
