<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR Blog | Admin Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .nav-active { background-color: rgba(255, 255, 255, 0.2); border-bottom: 2px solid white; }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="bg-[#1e40af] text-white p-6 shadow-lg">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-extrabold">HR Blog</h1>
                <p class="text-blue-200 italic">EXECUTIVE RECRUITMENT PLATFORM</p>
            </div>
            <button id="auth-btn" onclick="handleAuth()" class="text-sm font-semibold flex items-center gap-2 border px-4 py-2 rounded-lg hover:bg-blue-800">
                🔒 Admin Login
            </button>
        </div>
    </header>

    <!-- Content Area -->
    <main class="max-w-6xl mx-auto p-6 mt-4">
        <!-- Student Interface -->
        <div id="student-view" class="tab-content active">
            <h2 class="text-2xl font-bold mb-4">Candidate Portal</h2>
            <div class="bg-white p-6 rounded-xl shadow border">
                <input type="text" id="name" placeholder="Full Name" class="w-full p-3 border rounded mb-3">
                <input type="email" id="email" placeholder="Email Address" class="w-full p-3 border rounded mb-3">
                <button onclick="registerCandidate()" class="w-full bg-[#1e40af] text-white p-3 rounded font-bold">Register</button>
            </div>
        </div>

        <!-- Admin Interface -->
        <div id="admin-view" class="tab-content">
            <h2 class="text-2xl font-bold mb-4 text-[#1e40af]">Admin Command Center</h2>
            <div id="candidate-list" class="grid gap-4">
                <!-- Candidates will populate here -->
            </div>
        </div>
    </main>

    <script>
        let isAdmin = false;

        function handleAuth() {
            if (isAdmin) {
                isAdmin = false;
                document.getElementById('student-view').classList.add('active');
                document.getElementById('admin-view').classList.remove('active');
                document.getElementById('auth-btn').innerHTML = '🔒 Admin Login';
            } else {
                const pass = prompt("Enter Admin Passcode:");
                if (pass === "admin123") {
                    isAdmin = true;
                    document.getElementById('student-view').classList.remove('active');
                    document.getElementById('admin-view').classList.add('active');
                    document.getElementById('auth-btn').innerHTML = '🔓 Logout Admin';
                    renderAdminDashboard();
                } else {
                    alert("Access Denied.");
                }
            }
        }

        function registerCandidate() {
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            if(!name) return alert("Enter Name");
            
            const candidates = JSON.parse(localStorage.getItem('hr_candidates') || '[]');
            candidates.push({ name, email, id: Date.now() });
            localStorage.setItem('hr_candidates', JSON.stringify(candidates));
            alert("Registered successfully!");
        }

        function renderAdminDashboard() {
            const list = document.getElementById('candidate-list');
            const candidates = JSON.parse(localStorage.getItem('hr_candidates') || '[]');
            list.innerHTML = candidates.map(c => `
                <div class="bg-white p-4 rounded shadow flex justify-between items-center border-l-4 border-blue-600">
                    <div>
                        <p class="font-bold text-lg">${c.name}</p>
                        <p class="text-slate-500">${c.email}</p>
                    </div>
                    <button class="bg-red-500 text-white px-3 py-1 rounded text-sm" onclick="deleteCandidate(${c.id})">Delete</button>
                </div>
            `).join('');
        }

        function deleteCandidate(id) {
            let candidates = JSON.parse(localStorage.getItem('hr_candidates') || '[]');
            candidates = candidates.filter(c => c.id !== id);
            localStorage.setItem('hr_candidates', JSON.stringify(candidates));
            renderAdminDashboard();
        }
    </script>
</body>
</html>
