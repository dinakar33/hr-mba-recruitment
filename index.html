<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR Blog | Executive Recruitment Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .gradient-bg { background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%); }
    </style>
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB68T3Pz1DBCfqfPlt00qw9OI7hqTFjemQ",
            authDomain: "hr-blog-app.firebaseapp.com",
            databaseURL: "https://hr-blog-app-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "hr-blog-app",
            storageBucket: "hr-blog-app.firebasestorage.app",
            messagingSenderId: "622131978390",
            appId: "1:622131978390:web:ae9ae697d7c84dea9a22b7"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        window.db = db;
        window.ref = ref;
        window.set = set;
        window.onValue = onValue;
    </script>
</head>
<body class="bg-slate-50">

    <header class="gradient-bg text-white p-8 shadow-2xl">
        <div class="max-w-4xl mx-auto">
            <h1 class="text-4xl font-extrabold tracking-tight">HR Blog Assessment</h1>
            <p class="text-indigo-200 font-light italic mt-2">"Crack the Code, Know Your Worth." — Postgraduate Recruitment Hub</p>
        </div>
    </header>

    <div class="max-w-4xl mx-auto -mt-8 px-4 pb-12">
        <div class="bg-white rounded-2xl shadow-xl border border-slate-100 overflow-hidden">
            <div class="flex border-b border-slate-100 overflow-x-auto">
                <button onclick="showTab('tab1', this)" class="tab-trigger active px-8 py-4 font-semibold text-indigo-700 border-b-2 border-indigo-700 whitespace-nowrap">Onboarding</button>
                <button onclick="showTab('tab2', this)" class="tab-trigger px-8 py-4 font-semibold text-slate-500 hover:text-indigo-600 whitespace-nowrap">ATS Audit</button>
                <button onclick="showTab('tab3', this)" class="tab-trigger px-8 py-4 font-semibold text-slate-500 hover:text-indigo-600 whitespace-nowrap">Aptitude Test</button>
            </div>

            <div class="p-8">
                <div id="tab1" class="tab-content active space-y-6">
                    <h2 class="text-2xl font-bold text-slate-800">Candidate Registration</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <input type="text" id="name" placeholder="Full Name" class="p-4 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-600 outline-none w-full">
                        <input type="email" id="email" placeholder="Email Address" class="p-4 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-600 outline-none w-full">
                    </div>
                    <button onclick="saveOnboarding()" class="w-full bg-indigo-900 text-white p-4 rounded-xl font-bold text-lg hover:bg-indigo-800 transition shadow-lg">Start Professional Assessment</button>
                </div>

                <div id="tab2" class="tab-content space-y-6">
                    <h2 class="text-2xl font-bold text-slate-800">Stage 1: ATS Audit</h2>
                    <div class="border-2 border-dashed border-slate-200 p-8 rounded-2xl text-center">
                        <p class="text-slate-500 mb-4">Upload your resume for real-time keyword optimization analysis.</p>
                        <input type="file" id="resume" class="block w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-indigo-50 file:text-indigo-700">
                    </div>
                    <button onclick="runAts()" class="w-full bg-slate-800 text-white p-4 rounded-xl font-bold text-lg hover:bg-slate-900 transition">Analyze Resume</button>
                    <div id="ats-result" class="hidden p-6 bg-emerald-50 text-emerald-900 rounded-xl font-bold border border-emerald-200">ATS Match Score: 88%</div>
                </div>

                <div id="tab3" class="tab-content space-y-6">
                    <h2 class="text-2xl font-bold text-slate-800">Stage 2: Aptitude Test</h2>
                    <p class="text-slate-600">Why is cultural integration important in mergers?</p>
                    <select id="aptitude-answer" class="w-full p-4 border border-slate-200 rounded-xl bg-slate-50 outline-none">
                        <option>Strategic Leadership Alignment</option>
                        <option>Employee Retention</option>
                        <option>Operational Synergy</option>
                    </select>
                    <button onclick="submitTest()" class="w-full bg-indigo-900 text-white p-4 rounded-xl font-bold text-lg hover:bg-indigo-800 transition">Submit Test</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function showTab(id, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.tab-trigger').forEach(b => {
                b.classList.remove('text-indigo-700', 'border-b-2', 'border-indigo-700');
                b.classList.add('text-slate-500');
            });
            btn.classList.add('text-indigo-700', 'border-b-2', 'border-indigo-700');
            btn.classList.remove('text-slate-500');
        }

        async function saveOnboarding() {
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            if(!name || !email) return alert('Please fill in all fields');
            
            // Cloud Sync
            try {
                await window.set(window.ref(window.db, 'candidates/' + name.replace(/\s+/g, '_')), { name, email });
                alert('Profile Saved to Cloud.');
                document.querySelector('[onclick="showTab(\'tab2\', this)"]').click();
            } catch(e) {
                alert('Saved locally (Cloud offline)');
                document.querySelector('[onclick="showTab(\'tab2\', this)"]').click();
            }
        }

        function runAts() { document.getElementById('ats-result').classList.remove('hidden'); }
        function submitTest() { alert('Submission received. Good luck!'); }
    </script>
</body>
</html>
